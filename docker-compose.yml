# Da Vinci Burden Reduction Local Dev Stack
#
# All three services share a common network to be able to work using localhost
# This allows the default localhost URLs in application.yaml to work as-is.
# If configuring for a different environment, you can override URLs using environment variables as needed.
#
# Endpoints:
#   Provider:      http://localhost:8080        (frontend + FHIR at /fhir)
#   Payer:         http://localhost:8081/fhir
#   FAST Security: https://localhost:5001

services:
  fast-security:
    image: hlseven/fast-udap-security:latest
    container_name: fast-security
    ports:
      - "5000:5000" # security http
      - "5001:5001" # security https
      - "8080:8080" # provider
      - "8081:8081" # payer
    environment:
      ASPNETCORE_URLS: "https://+:5001;http://+:5000"
      ASPNETCORE_ENVIRONMENT: Development

  br-payer:
    image: hlseven/davinci-br-payer:latest
    container_name: br-payer
    network_mode: "service:fast-security"
    depends_on:
      - fast-security

  br-provider:
    # image: hlseven/davinci-br-provider:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: br-provider
    network_mode: "service:fast-security"
    environment:
      JAVA_TOOL_OPTIONS: "-Djdk.internal.httpclient.disableHostnameVerification"
      SECURITY_EXTERNAL_BASE_URL: "http://localhost:8080"
    depends_on:
      - fast-security
      - br-payer
